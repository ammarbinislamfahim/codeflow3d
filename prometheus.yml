global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'codeflow3d'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend metrics
  - job_name: 'codeflow-backend'
    static_configs:
      - targets: ['backend:9100']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Node exporter (if running on host)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['localhost:9100']

  # PostgreSQL exporter (optional)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['localhost:9187']

  # Redis exporter (optional)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['localhost:9121']