[build]
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Admin panel route
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

# ── API Proxy ──────────────────────────────────────────────────────────
# Proxy /api/* requests to the Render backend.
# This eliminates CORS entirely — the browser talks to the same origin.
# Set BACKEND_URL env var on Netlify (e.g. https://codeflow3d-backend.onrender.com)
[[redirects]]
  from   = "/api/:splat"
  to     = ":BACKEND_URL/:splat"
  status = 200
  force  = true
  headers = {X-From = "netlify"}

# SPA fallback — all routes serve index.html so the JS router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache JS/CSS assets long-term (Vite hashes filenames so safe to do)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache index.html
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
